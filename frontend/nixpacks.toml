# Nixpacks configuration for Frontend service
# For Railway service deployed at /frontend root
# No cd commands needed

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install --no-optional"
]

[phases.build]
cmds = [
  "npm run build"
]

[start]
cmd = "npm run preview -- --port $PORT --host 0.0.0.0"
