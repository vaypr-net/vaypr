# Master Nixpacks Configuration - Routes to correct service
# This is a fallback. Each service should have Root Directory set in Railway:
#   Backend:  Root Directory = /backend
#   Frontend: Root Directory = /frontend
# 
# If Root Directory is NOT set, this config will run (not ideal).
# This is why per-service /backend/nixpacks.toml and /frontend/nixpacks.toml exist.

# Force Node 20 (required for Mongoose)
[phases.setup]
nixPkgs = ["nodejs_20"]

# MINIMIZE potential issues - just error with instructions
[phases.install]
cmds = [
  "echo '⚠️  ERROR: Root service config should not be used!'",
  "echo 'Please set Root Directory in Railway Settings:'",
  "echo 'Backend service: Root Directory = /backend'",
  "echo 'Frontend service: Root Directory = /frontend'",
  "exit 1"
]
