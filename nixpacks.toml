# Nixpacks configuration for Vayper Frontend

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "cd frontend",
  "npm install"
]

[phases.build]
cmds = [
  "cd frontend",
  "NODE_ENV=production npm run build"
]

[start]
cmd = "cd frontend && npm run preview -- --port $PORT --host 0.0.0.0"
