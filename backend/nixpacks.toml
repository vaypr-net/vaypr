# Nixpacks configuration for Backend service
# For Railway service deployed at /backend root
# No cd commands needed

[phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium"
]

[phases.install]
cmds = [
  "npm install",
  "PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install chromium"
]

[phases.build]
cmds = [
  "npm run build"
]

[start]
cmd = "npm run start:prod"
