# Nixpacks configuration for Backend service
# For Railway service deployed at /backend root
# PDF generation uses PDFKit (pure Node.js) — no Chromium needed.

[phases.setup]
nixPkgs = [
  "nodejs_20"
]

[phases.install]
cmds = [
  "npm install"
]

[phases.build]
cmds = [
  "npm run build"
]

[start]
cmd = "npm run start:prod"
