# Nixpacks configuration for Backend service
# For Railway service deployed at /backend root
# No cd commands needed

# PLAYWRIGHT_BROWSERS_PATH=0 makes Playwright install its Chromium into
# the project directory (alongside node_modules). This variable MUST be
# present at runtime too so Playwright can locate its browser when the
# server starts. Setting it here in [variables] ensures it is baked into
# the image and available at all stages (install, build, and runtime).
[variables]
PLAYWRIGHT_BROWSERS_PATH = "0"
PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS = "true"

[phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium"
]

[phases.install]
cmds = [
  "npm install",
  "npx playwright install chromium"
]

[phases.build]
cmds = [
  "npm run build"
]

[start]
cmd = "npm run start:prod"
