services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: vayper-backend:latest
    container_name: vayper-backend
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - coolify
    security_opt:
      - no-new-privileges:true
    read_only: false
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"

      - "traefik.http.routers.vaypr-api-http.rule=Host(`api.vaypr.net`)"
      - "traefik.http.routers.vaypr-api-http.entrypoints=http"
      - "traefik.http.routers.vaypr-api-http.middlewares=vaypr-api-redirect"

      - "traefik.http.routers.vaypr-api.rule=Host(`api.vaypr.net`)"
      - "traefik.http.routers.vaypr-api.entrypoints=https"
      - "traefik.http.routers.vaypr-api.tls=true"
      - "traefik.http.routers.vaypr-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.vaypr-api.service=vaypr-api-svc"

      - "traefik.http.middlewares.vaypr-api-redirect.redirectscheme.scheme=https"
      - "traefik.http.services.vaypr-api-svc.loadbalancer.server.port=4040"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://api.vaypr.net
    image: vayper-frontend:latest
    container_name: vayper-frontend
    environment:
      - VITE_API_BASE_URL=https://api.vaypr.net
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - coolify
    security_opt:
      - no-new-privileges:true
    read_only: false
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"

      - "traefik.http.routers.vaypr-web-http.rule=Host(`vaypr.net`) || Host(`www.vaypr.net`)"
      - "traefik.http.routers.vaypr-web-http.entrypoints=http"
      - "traefik.http.routers.vaypr-web-http.middlewares=vaypr-web-redirect"

      - "traefik.http.routers.vaypr-web.rule=Host(`vaypr.net`) || Host(`www.vaypr.net`)"
      - "traefik.http.routers.vaypr-web.entrypoints=https"
      - "traefik.http.routers.vaypr-web.tls=true"
      - "traefik.http.routers.vaypr-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.vaypr-web.service=vaypr-web-svc"

      - "traefik.http.middlewares.vaypr-web-redirect.redirectscheme.scheme=https"
      - "traefik.http.services.vaypr-web-svc.loadbalancer.server.port=80"

networks:
  coolify:
    external: true
