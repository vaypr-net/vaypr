name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate backend build
        working-directory: backend
        run: |
          npm install
          npm run build

      - name: Validate frontend build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://api.vaypr.net
        run: |
          npm install
          npm run build

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_PORT"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vaypr_vps_key
          chmod 600 ~/.ssh/vaypr_vps_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/vaypr_vps_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" <<'EOF'
            set -euo pipefail

            cd /home/deploy/vaypr
            test -f .env

            git pull --ff-only origin main
            docker compose config >/tmp/vaypr-production-compose.yml
            docker compose up -d --build
            docker compose ps
            docker logs --tail=80 vayper-backend
            docker logs --tail=40 vayper-frontend
          EOF
