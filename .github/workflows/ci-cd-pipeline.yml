name: CI/CD Pipeline - Essential Build & Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  PROJECT_DIR: /var/www/projects/vayper

jobs:
  code-quality:
    name: Code Quality
    runs-on: [self-hosted, development]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install --legacy-peer-deps --prefer-offline

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps --prefer-offline

      - name: TypeScript Type Check - Backend
        working-directory: backend
        run: npx tsc --noEmit || echo "TypeScript check completed with warnings"

      - name: TypeScript Type Check - Frontend
        working-directory: frontend
        run: npx tsc --noEmit || echo "TypeScript check completed with warnings"

      - name: ESLint - Frontend
        working-directory: frontend
        run: npx eslint . --ext .ts,.tsx --max-warnings=100 || echo "ESLint completed with warnings"

  build:
    name: Build Docker Images
    runs-on: [self-hosted, development]
    needs: code-quality
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Backend Image
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Building Backend Docker Image ==="
          docker build \
            --file backend/Dockerfile \
            --tag vayper-backend:${{ github.sha }} \
            --tag vayper-backend:latest \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            ./backend

      - name: Build Frontend Image
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Building Frontend Docker Image ==="
          docker build \
            --file frontend/Dockerfile \
            --tag vayper-frontend:${{ github.sha }} \
            --tag vayper-frontend:latest \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            ./frontend

  deploy:
    name: Deploy to Production
    runs-on: [self-hosted, development]
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pre-deployment Health Check
        run: |
          echo "=== Pre-deployment Checks ==="
          docker info | head -10
          docker compose version
          df -h | head -5

      - name: Stop Existing Containers
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          docker compose down --remove-orphans 2>/dev/null || echo "No containers to stop"

      - name: Deploy New Containers
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          docker compose up -d --force-recreate

      - name: Wait for Services to be Healthy
        run: |
          echo "Waiting for services to become healthy..."
          sleep 30

          BACKEND_OK=false
          for i in {1..10}; do
            if curl -sf http://localhost:4040/health > /dev/null 2>&1; then
              echo "✅ Backend is healthy"
              BACKEND_OK=true
              break
            fi
            echo "Waiting for backend... (attempt $i/10)"
            sleep 5
          done

          FRONTEND_OK=false
          for i in {1..10}; do
            if curl -sf http://localhost:3004 > /dev/null 2>&1; then
              echo "✅ Frontend is healthy"
              FRONTEND_OK=true
              break
            fi
            echo "Waiting for frontend... (attempt $i/10)"
            sleep 5
          done

          if [ "$BACKEND_OK" = true ] && [ "$FRONTEND_OK" = true ]; then
            echo "🎉 Deployment successful!"
          else
            echo "⚠️ Some services may not be healthy"
            exit 1
          fi
