name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, development]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Pull and Deploy
        run: |
          cd /var/www/projects/vayper
          git fetch origin main
          git reset --hard origin/main
          docker compose up -d --build --remove-orphans
