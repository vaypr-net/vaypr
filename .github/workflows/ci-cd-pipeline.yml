name: Security Scan Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  dependency-audit:
    name: Dependency Security Audit
    runs-on: [self-hosted, development]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install --legacy-peer-deps --prefer-offline

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps --prefer-offline

      - name: Audit Backend Dependencies
        working-directory: backend
        run: |
          echo "=== Backend Dependency Audit ==="
          npm audit --audit-level=high --omit=dev || true

      - name: Audit Frontend Dependencies
        working-directory: frontend
        run: |
          echo "=== Frontend Dependency Audit ==="
          npm audit --audit-level=high --omit=dev || true

  secret-scan:
    name: Secret & Credential Detection
    runs-on: [self-hosted, development]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Gitleaks if needed
        run: |
          mkdir -p ~/bin
          export PATH="$HOME/bin:$PATH"
          if ! command -v gitleaks &> /dev/null; then
            echo "Installing gitleaks..."
            cd /tmp
            wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz || true
            tar -xzf gitleaks_8.18.4_linux_x64.tar.gz || true
            if [ -f gitleaks ]; then
              chmod +x gitleaks
              mv gitleaks ~/bin/ || true
            fi
          else
            echo "gitleaks already installed"
          fi
          command -v gitleaks || echo "gitleaks not installed"

      - name: Run Gitleaks Secret Scan
        run: |
          if command -v gitleaks &> /dev/null; then
            gitleaks detect --source . --verbose --redact --report-format json --report-path /tmp/gitleaks-report.json || true
            echo "=== Gitleaks Scan Complete ==="
          else
            echo "gitleaks not available, performing basic secret check..."
            grep -rn "password\s*=\s*['"]" --include="*.ts" --include="*.js" . 2>/dev/null | grep -v node_modules | head -20 || true
            grep -rn "sk_live_\|sk_test_\|api_key\s*=\s*['"]" --include="*.ts" --include="*.js" . 2>/dev/null | grep -v node_modules | head -20 || true
          fi

  dockerfile-lint:
    name: Dockerfile Security Scan
    runs-on: [self-hosted, development]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Hadolint if needed
        run: |
          mkdir -p ~/bin
          export PATH="$HOME/bin:$PATH"
          if ! command -v hadolint &> /dev/null; then
            echo "Installing hadolint..."
            cd /tmp
            wget -q https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64 || true
            chmod +x hadolint-Linux-x86_64 || true
            if [ -f hadolint-Linux-x86_64 ]; then
              mv hadolint-Linux-x86_64 ~/bin/hadolint || true
            fi
          else
            echo "hadolint already installed"
          fi
          command -v hadolint || echo "hadolint not installed"

      - name: Lint Backend Dockerfile
        run: |
          if command -v hadolint &> /dev/null; then
            hadolint backend/Dockerfile || true
          else
            echo "hadolint missing: cannot lint backend/Dockerfile"
          fi

      - name: Lint Frontend Dockerfile
        run: |
          if [ -f frontend/Dockerfile ]; then
            if command -v hadolint &> /dev/null; then
              hadolint frontend/Dockerfile || true
            else
              echo "hadolint missing: cannot lint frontend/Dockerfile"
            fi
          else
            echo "frontend/Dockerfile not found, skipping"
          fi

  build:
    name: Build Docker Images
    runs-on: [self-hosted, development]
    needs: [dependency-audit, secret-scan, dockerfile-lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: |
          docker build --file backend/Dockerfile --tag vayper-backend:${{ github.sha }} --tag vayper-backend:latest ./backend

      - name: Build Frontend Image
        run: |
          docker build --file frontend/Dockerfile --tag vayper-frontend:${{ github.sha }} --tag vayper-frontend:latest ./frontend

  image-scan:
    name: Docker Image Vulnerability Scan
    runs-on: [self-hosted, development]
    needs: build
    steps:
      - name: Install Trivy if needed
        run: |
          if ! command -v trivy &> /dev/null; then
            echo "Installing trivy..."
            cd /tmp
            wget -q https://github.com/aquasecurity/trivy/releases/download/v0.50.1/trivy_0.50.1_Linux-64bit.deb || true
            sudo dpkg -i trivy_0.50.1_Linux-64bit.deb || true
          else
            echo "trivy already installed"
          fi
          command -v trivy || echo "trivy not installed"

      - name: Scan Backend Image
        run: |
          if command -v trivy &> /dev/null; then
            trivy image --severity HIGH,CRITICAL --format table vayper-backend:latest || true
          else
            echo "trivy not installed: cannot scan backend image"
          fi

      - name: Scan Frontend Image
        run: |
          if command -v trivy &> /dev/null; then
            trivy image --severity HIGH,CRITICAL --format table vayper-frontend:latest || true
          else
            echo "trivy not installed: cannot scan frontend image"
          fi
