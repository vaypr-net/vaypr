services:
  backend-staging:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: vayper-backend-staging:latest
    container_name: vayper-backend-staging
    env_file:
      - .env.staging
    restart: unless-stopped
    networks:
      - coolify
    security_opt:
      - no-new-privileges:true
    read_only: false
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"

      - "traefik.http.routers.vaypr-api-staging-http.rule=Host(`api-staging.vaypr.net`)"
      - "traefik.http.routers.vaypr-api-staging-http.entrypoints=http"
      - "traefik.http.routers.vaypr-api-staging-http.middlewares=vaypr-api-staging-redirect"

      - "traefik.http.routers.vaypr-api-staging.rule=Host(`api-staging.vaypr.net`)"
      - "traefik.http.routers.vaypr-api-staging.entrypoints=https"
      - "traefik.http.routers.vaypr-api-staging.tls=true"
      - "traefik.http.routers.vaypr-api-staging.tls.certresolver=letsencrypt"
      - "traefik.http.routers.vaypr-api-staging.service=vaypr-api-staging-svc"

      - "traefik.http.middlewares.vaypr-api-staging-redirect.redirectscheme.scheme=https"
      - "traefik.http.services.vaypr-api-staging-svc.loadbalancer.server.port=4040"

  frontend-staging:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://api-staging.vaypr.net
    image: vayper-frontend-staging:latest
    container_name: vayper-frontend-staging
    environment:
      - VITE_API_BASE_URL=https://api-staging.vaypr.net
    depends_on:
      - backend-staging
    restart: unless-stopped
    networks:
      - coolify
    security_opt:
      - no-new-privileges:true
    read_only: false
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"

      - "traefik.http.routers.vaypr-web-staging-http.rule=Host(`staging.vaypr.net`)"
      - "traefik.http.routers.vaypr-web-staging-http.entrypoints=http"
      - "traefik.http.routers.vaypr-web-staging-http.middlewares=vaypr-web-staging-redirect"

      - "traefik.http.routers.vaypr-web-staging.rule=Host(`staging.vaypr.net`)"
      - "traefik.http.routers.vaypr-web-staging.entrypoints=https"
      - "traefik.http.routers.vaypr-web-staging.tls=true"
      - "traefik.http.routers.vaypr-web-staging.tls.certresolver=letsencrypt"
      - "traefik.http.routers.vaypr-web-staging.service=vaypr-web-staging-svc"

      - "traefik.http.middlewares.vaypr-web-staging-redirect.redirectscheme.scheme=https"
      - "traefik.http.services.vaypr-web-staging-svc.loadbalancer.server.port=80"

networks:
  coolify:
    external: true
